<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спортивные прогнозы</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 16px;
            background: #ffffff;
        }
        .event-card {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        button {
            background: #2481cc;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🏆 Спортивные прогнозы</h1>
    
    <div id="events">
        <p>Загрузка...</p>
    </div>

    <script>
        // Проверка работы API
        fetch('/api/events')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('events');
                if (data.events && data.events.length > 0) {
                    container.innerHTML = data.events.map(event => `
                        <div class="event-card">
                            <h3>⚽️ ${event.title}</h3>
                            <p>${event.description}</p>
                            <div>
                                ${Object.keys(event.options).map(opt => `
                                    <button onclick="placeBet(${event.id}, '${opt}')">${opt} (x${event.options[opt]})</button>
                                `).join('')}
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p>Нет активных событий</p>';
                }
            })
            .catch(err => {
                document.getElementById('events').innerHTML = '<p>Ошибка загрузки: ' + err.message + '</p>';
            });

        function placeBet(eventId, option) {
            alert(`Прогноз: ${option}\n(API в разработке)`);
        }
    </script>
</body>
</html>
